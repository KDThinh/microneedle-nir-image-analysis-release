# =====================================================================
# Microneedle NIR Image Analysis — Configuration
# =====================================================================
#
# This file holds (1) global default parameters used by the pipeline,
# and (2) per-experiment "profiles" under the `profiles:` block.
#
# To run a specific experiment from the directory containing this file:
#   microneedle-analysis analyze --profile <profile_id>
# See `microneedle-analysis analyze --help` for more options.
#
# ---------------------------------------------------------------------
# Profile naming convention
# ---------------------------------------------------------------------
#   fig{N}_{species}_{condition}_[{role}_]rep{NN}
#
#     fig{N}      figure number (3, 4, 5)
#     species     nb (N. benthamiana) | bokchoy | rice
#     condition   exoiaa  -> exogenous IAA via petiole uptake (Fig. 3)
#                 iaaM    -> XVE::iaaM induction (Fig. 4)
#                 shade   -> simulated shade treatment (Fig. 5)
#                 light   -> control white light (Fig. 5)
#     role        treatment | control     (used only where ambiguous, e.g. Fig. 4)
#     rep{NN}     rep01 = main-figure replicate; rep02+ = additional
#                 biological replicates shown in supplementary figures.
#
# ---------------------------------------------------------------------
# Per-profile fields
# ---------------------------------------------------------------------
#   folder_path                 Absolute path to the TIFF folder. Replace
#                               <DATA_ROOT> with your local absolute path
#                               to the deposited data folder.
#   file_keywords               Case-insensitive substrings used to assign
#                               each .tif file to a channel.
#   output_subdirs              Per-keyword output subfolders (same order
#                               as file_keywords).
#   exposure_per_frame          Seconds per frame for this dataset.
#   skip_initial_frames         Frames at start of stack to ignore.
#   normalization_starting_frame /
#   normalization_ending_frame  Window used to compute the pre-treatment
#                               baseline for I/I0 normalization.
#   max_frame                   null = use full stack; integer = cap on
#                               frame index after skip.
#   spots_to_track_IAA /
#   spots_to_track_Ref          Indices of detected tips to include in
#                               the cohort for each channel. null = all.
#   spots_to_track              Fallback when neither _IAA nor _Ref is set.
#   threshold_rel               Per-profile override of detection threshold
#                               (default in `detection:` block below).
#   correct_shift /
#   shift_frame /
#   shift_end_frame             Optional XY drift correction; null =
#                               auto-detect or single-frame shift.
#
# =====================================================================


# ---------------------------------------------------------------------
# Global defaults
# ---------------------------------------------------------------------

exposure_per_frame: 30  # seconds per frame (global default for time axes)

background_subtraction:
  radius: 25
  visualize: true

detection:
  min_distance: 4
  threshold_rel: 0.2
  visualize: true

tracking:
  spots_to_track: null      # null = track all detected spots
  search_range: 10          # ROI search radius in pixels
  diameter: 5               # Spot diameter for intensity calculation
  min_distance: 3           # Minimum distance separating peaks
  threshold_rel: 0.5        # Relative threshold for peak detection
  background_roi: null      # Background ROI [y_min, y_max, x_min, x_max];
                            # null = exclude spots from whole-frame background
  skip_initial_frames: 0    # Frames to skip at start of stack
  max_frame: null           # null = process full stack

normalization:
  starting_frame: 100
  ending_frame: 300

visualization:
  exposure_per_frame: 30
  format: svg

# Cohort QC across tracked tips (per TIFF): leave-one-out median, RMS
# distance, robust flags. Outputs figures + cohort_qc.csv in output dir.
cohort_qc:
  enabled: true
  # RMS threshold = median(d) + mad_lambda * 1.4826 * MAD(d).
  mad_lambda: 2.0

smoothing:
  exposure_per_frame: 30
  alpha: 0.05
  min_time_range: [210, 700]   # minutes
  # Used by visualization helpers only; pipeline does not apply
  # post-normalization drift correction.
  n_frames_baseline: 50
  # Trend overlays on cohort_qc_before_after figure.
  trend_smoothing:
    enabled: true
    lowess_frac: 0.2
    savgol_window: 51
    savgol_polyorder: 3
    rolling_window: 50

artifact_correction:
  enabled: true
  window: 10
  sigma_threshold: 5
  max_iter: 10


